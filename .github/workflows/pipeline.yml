# Nombre del pipeline, aparece en la UI de GitHub Actions
name: Pipeline DevOps

# Cuándo se dispara el pipeline
on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:                          # ← nivel workflow (disponible en todos los jobs)
  APP_NAME: lab-github-actions
  REGISTRY: docker.io

# Lista de jobs del pipeline
jobs:

  # ── JOB 1: BUILD ──────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest     # Tipo de runner (VM con Ubuntu)
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}  # Exporta el tag generado para usarlo en otros jobs
    steps:

      # Descarga el código del repo en el runner
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Imprimir contexto
        run: |
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Runner OS: ${{ runner.os }}"

      - name: Generar tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "value=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Generar reporte de build
        run: |
          mkdir -p reports
          echo "## Build Report" > reports/build-report.md
          echo "- App: ${{ env.APP_NAME }}" >> reports/build-report.md
          echo "- Tag: ${{ steps.tag.outputs.value }}" >> reports/build-report.md
          echo "- SHA: ${{ github.sha }}" >> reports/build-report.md
          echo "- Branch: ${{ github.ref_name }}" >> reports/build-report.md
          echo "- Actor: ${{ github.actor }}" >> reports/build-report.md
          echo "- Fecha: $(date -u)" >> reports/build-report.md

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ steps.tag.outputs.value }}
          path: reports/
          retention-days: 30    

      # Construye la imagen Docker pero NO la sube a ningún registry
      # El tag usa los primeros 7 caracteres del SHA
      - name: Build imagen (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .                              # Usa el directorio raíz como contexto
          push: false                             # Solo build, sin push
          tags: ${{ env.APP_NAME}}:${{ steps.tag.outputs.value }}  # Tag con el SHA corto (7 caracteres)

  # ── JOB 2: SCAN ───────────────────────────────────────────────
  scan:
    name: Scan de seguridad (Trivy)
    runs-on: ubuntu-latest
    needs: build               # Solo corre si build pasó exitosamente

    steps:
      - name: Usar tag del job anterior
        run: echo "Escaneando imagen con tag ${{ needs.build.outputs.image-tag }}!"

      # Necesita volver a hacer checkout porque es una VM nueva
      - name: Checkout código
        uses: actions/checkout@v4

      # Reconstruye la imagen porque la VM del job build ya no existe
      # load: true → la carga en el daemon local de Docker para poder escanearla
      - name: Build imagen para escaneo
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.APP_NAME}}:${{ needs.build.outputs.image-tag }}

      # Escanea la imagen buscando vulnerabilidades
      - name: Escaneo Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{env.APP_NAME}}:${{ needs.build.outputs.image-tag }}
          format: table          # Muestra resultado en formato tabla
          exit-code: '1'         # Si encuentra vulns, falla el pipeline
          ignore-unfixed: true   # Ignora vulns sin fix disponible
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'  # Solo falla por críticas y altas

  # ── JOB 3: TEST ───────────────────────────────────────────────
  test:
    name: Quality Gate (SonarCloud)
    runs-on: ubuntu-latest
    needs: scan                # Solo corre si scan pasó

    steps:

      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Descarga TODO el historial (SonarCloud lo necesita)

      # Analiza el código fuente con SonarCloud
      # Usa dos secrets: el token de GitHub y el token de SonarCloud
      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Lo genera GitHub automáticamente
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # Lo configuraste vos en el repo

  # ── JOB 4: PUSH ───────────────────────────────────────────────
  push-artifact:
    name: Push a Docker Hub
    runs-on: ubuntu-latest
    needs: [test, build]                # Solo corre si test y build pasaron
    if: github.event_name != 'pull_request'  # No pushea en PRs, solo en push real

    steps:

      - name: Checkout código
        uses: actions/checkout@v4

      # Se autentica en Docker Hub con secrets del repo
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construye la imagen y la sube con dos tags:
      # - :latest → siempre apunta a la última versión
      # - :SHA    → tag fijo e irrepetible para esa versión exacta
      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ needs.build.outputs.image-tag }}

  # ── JOB 5: DEPLOY DEV ─────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    needs: push-artifact
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy a S3 (dev)
        run: aws s3 sync ./ s3://${{ secrets.S3_BUCKET }} --delete

  # ── JOB 6: DEPLOY STAGING ─────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: push-artifact
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy a S3 (staging)
        run: aws s3 sync ./ s3://${{ secrets.S3_BUCKET }} --delete

  # ── JOB 7: DEPLOY PRODUCTION ──────────────────────────────────
  deploy-production:
    name: Deploy → production
    needs: push-artifact
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy a S3 (production)
        run: aws s3 sync ./ s3://${{ secrets.S3_BUCKET }} --delete